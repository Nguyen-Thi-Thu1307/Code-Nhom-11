<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nbreak Coffee</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.khung-trang{
max-width:1200px;
margin:auto;
}

header{
background:#4b2e2b;
color:white;
}

.header-khung{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 0;
}

.logo{
display:flex;
align-items:center;
gap:10px;
text-decoration:none;
color:white;
}

.logo-vong{
width:40px;
height:40px;
border-radius:50%;
background:#c8a27c;
}

.logo-text{
font-size:20px;
font-weight:bold;
}

.timkiem input{
width:320px;
padding:9px;
border-radius:6px;
border:none;
outline:none;
}

.nut-dieu-huong button{
margin-left:10px;
padding:9px 15px;
background:#6f4e37;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.nut-dieu-huong button:hover{
background:#c8a27c;
color:black;
}

.noi-dung{
display:flex;
margin-top:30px;
}

.menu-trai{
width:225px;
position:sticky;
top:20px;
}

.menu-trai ul{
list-style:none;
padding:0;
}

.menu-trai li{
background:#c8a27c;
margin-bottom:10px;
padding:12px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.menu-trai li:hover{
background:#6f4e37;
color:white;
}

.luoi-sanpham{
flex:1;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-left:20px;
}

.sanpham{
background:white;
padding:12px;
text-align:center;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.sanpham:hover{
transform:translateY(-5px);
box-shadow:0 6px 14px rgba(0,0,0,0.15);
}

.sanpham-anh{
width:100%;
height:150px;
object-fit:cover;
margin-bottom:10px;
border-radius:8px;
}

.sanpham-bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.sanpham-info{
flex:1;
text-align:center;
font-size:14px;
}

.sanpham button{
width:28px;
height:28px;
border:none;
background:#6f4e37;
color:white;
border-radius:5px;
cursor:pointer;
}

.sanpham button:hover{
background:#4b2e2b;
}

.nut-zalo{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#0068ff;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
cursor:pointer;
}

footer{
margin-top:50px;
background:#4b2e2b;
color:white;
padding:25px;
}

.ban-do{
margin-top:15px;
}

iframe{
width:100%;
height:300px;
border:0;
}

</style>

</head>
